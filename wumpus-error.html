<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wumpus Mesajı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    background: url('https://cdn.tua.gov.tr/618cae9543267.jpg') center center / cover no-repeat fixed;
    position: relative;
    color: #f44336;
  }

  /* Hareket eden yatay çizgiler */
  .moving-bars {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bar {
    position: absolute;
    height: 3px;
    width: 100vw;
    background: rgba(255, 0, 0, 0.25);
    animation: moveBar 10s linear infinite;
  }

  .bar:nth-child(1) {
    top: 10%;
    animation-duration: 12s;
    animation-delay: 0s;
  }
  .bar:nth-child(2) {
    top: 25%;
    animation-duration: 15s;
    animation-delay: 3s;
  }
  .bar:nth-child(3) {
    top: 40%;
    animation-duration: 18s;
    animation-delay: 5s;
  }
  .bar:nth-child(4) {
    top: 55%;
    animation-duration: 14s;
    animation-delay: 1s;
  }
  .bar:nth-child(5) {
    top: 70%;
    animation-duration: 20s;
    animation-delay: 4s;
  }
  .bar:nth-child(6) {
    top: 85%;
    animation-duration: 16s;
    animation-delay: 2s;
  }

  @keyframes moveBar {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Gömülü mesaj kutusu (embed style) */
  .embed-box {
    background: rgba(31, 31, 31, 0.85);
    border-left: 6px solid #f44336;
    box-shadow:
      0 0 15px #ff3d3d,
      0 0 30px #ff3d3d;
    max-width: 650px;
    padding: 1.5rem 2rem;
    color: #eee;
    font-weight: 600;
    font-size: 1.25rem;
    line-height: 1.5;
    border-radius: 8px;
    z-index: 10;
    position: relative;
    text-align: left;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
  }
</style>
</head>
<body>

<div class="moving-bars">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="embed-box">
  Saygıdeğer Ayk personelleri, sizlerle bu çıktığımız yolda çok bir şey kat edemedik ama azıcık da olsa bir yol kat ettik.<br />
  Herkes bizim ne kadar ezik bir kurum olduğumuzu konuşuyor.<br />
  Bizim sizden tek istediğimiz çalışmanızdır.<br />
  Unutmayın, çalışmanın başarısı her zaman güzel bir ödülle taçlandırılır.
</div>

</body>
</html>
